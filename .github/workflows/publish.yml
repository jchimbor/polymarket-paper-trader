name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    name: Test before publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run tests
        if: matrix.python-version != '3.13'
        run: python -m pytest tests/ -x -q -m "not live"
      - name: Run tests with coverage
        if: matrix.python-version == '3.13'
        run: python -m pytest tests/ -x -q -m "not live" --cov=pm_trader --cov-report=term-missing --cov-fail-under=100

  publish-pypi:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  publish-clawhub:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish to ClawHub
        run: |
          npx clawhub auth login --token "$CLAWHUB_TOKEN" --no-browser
          npx clawhub publish skill/polymarket-paper-trader \
            --version "${{ steps.version.outputs.VERSION }}" \
            --changelog "Release ${{ github.ref_name }}"
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}

  release:
    needs: [publish-pypi, publish-clawhub]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
